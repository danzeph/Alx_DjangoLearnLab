{% extends 'base.html' %}

{% block title %}Delete Post{% endblock %}

{% block content %}

<h2>Delete comment</h2>

<p>Are you sure you want to delete "<strong>{{ post.title }}</strong>"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Yes, Delete</button>
</form>

<a href="{% url 'post-detail' comment.post.id %}">Cancel?</a>

{% endblock %}
