{% extends 'base.html' %}

{% block title %}Edit Post{% endblock %}

{% block content %}

<h2>Edit Post</h2>

<form method="POST">
    {% csrf_token %}
    {{ form.as_p }}

    <div class="tags">
        <strong>Available tags:</strong>

        {% for tag in tags %}
            <span class="tag" onclick="addTag('{{ tag.name }}')">{{ tag.name }}</span>
        {% endfor %}
    </div>

    <button type="submit">Update Post</button>
</form>

<a href="{% url 'post-detail' post.id %}">Cancel</a>

{% endblock %}
