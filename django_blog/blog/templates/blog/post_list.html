{% extends 'base.html' %}

{% block title %}Blog Posts{% endblock %}

{% block content %}

<h2>All Posts</h2>

<a href="{% url 'post-create' %}">Create New Post</a>

<ul>
    {% for post in posts %}
        <li>
            <a href="{% url 'post-detail' post.id %}">
                {{ post.title }}
            </a>

            <br>
            <p>Content {{ post.content|truncatechars:30 }}...</p>
        </li>

    {% empty %}
        <p>No posts available.</p>
    {% endfor %}
</ul>

{% endblock %}
