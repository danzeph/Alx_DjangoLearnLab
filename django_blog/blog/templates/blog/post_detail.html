{% extends 'base.html' %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

<h2>{{ post.title }}</h2>

<p>{{ post.content }}</p>

<p>
    <strong>Author:</strong> {{ post.author.username }} <br>
    <strong>Published:</strong> {{ post.published_date }}
    <strong>Content:</strong> 
<b></br>
<b></br>
</p>
<a href="{% url 'post-update' post.id %}">Edit</a> |
<a href="{% url 'post-delete' post.id %}">Delete</a> |
<a href="{% url 'post-list' %}">Back to Posts</a>

{% endblock %}
