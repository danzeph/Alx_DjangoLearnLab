{% extends "blog/base.html" %}
{% block title %} Login View {% endblock %}
{% block content %}
<h2> Login </h2>
{% if form.errors %}
    <p>Invalid username or password. Please try again.</p>
{% endif %}
<form method ="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit"> Login </button>
</form>
{% endblock %}
